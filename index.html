<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Survey Completion — McClone Construction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f4f1;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.25rem 4rem;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid #e2e0d8;
      padding: 2.25rem 2.5rem 2.5rem;
      width: 100%;
      max-width: 580px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a7d5e;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a18;
      margin-bottom: 2rem;
      line-height: 1.2;
    }

    .region {
      margin-bottom: 1.5rem;
    }

    .region:last-child {
      margin-bottom: 0;
    }

    .region-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
    }

    .region-name {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a18;
    }

    .region-pct {
      font-size: 13px;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    .bar-track {
      background: #eeede8;
      border-radius: 5px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .divider {
      border: none;
      border-top: 1px solid #e2e0d8;
      margin: 2rem 0 1.25rem;
    }

    .footer {
      font-size: 11px;
      color: #aaa89e;
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem 2rem; }
      h1 { font-size: 20px; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #141412; }
      .card { background: #1e1d1b; border-color: #2e2d2a; }
      .eyebrow { color: #a0906c; }
      h1 { color: #f0ede6; }
      .region-name { color: #f0ede6; }
      .bar-track { background: #2a2926; }
      .divider { border-color: #2e2d2a; }
      .footer { color: #6a6860; }
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">McClone Construction</p>
    <h1>AI Survey Completion</h1>
    <div id="regions"></div>
    <hr class="divider" />
    <p class="footer" id="footer"></p>
  </div>

  <script>
    const COLORS = [
      { bar: '#3a6fa8', label: '#2d5887' },  /* Colorado     — steel blue   */
      { bar: '#c0773a', label: '#9a5e2c' },  /* Hawaii       — warm amber   */
      { bar: '#4e9e6e', label: '#357a52' },  /* N. Cal/Nev   — sage green   */
      { bar: '#8a5bbf', label: '#6e43a0' },  /* Utah         — purple       */
      { bar: '#3a9eaa', label: '#287880' },  /* Wash/Oregon  — teal         */
      { bar: '#b84c4c', label: '#943a3a' },  /* Corporate    — terracotta   */
    ];

    fetch('data.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('regions');

        data.regions.forEach((region, i) => {
          const pct = Math.min(100, Math.max(0, region.percent));
          const color = COLORS[i] || COLORS[0];

          const div = document.createElement('div');
          div.className = 'region';
          div.innerHTML = `
            <div class="region-header">
              <span class="region-name">${region.name}</span>
              <span class="region-pct" style="color:${color.label}">${pct}%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" style="width:0%;background:${color.bar}" data-target="${pct}"></div>
            </div>
          `;
          container.appendChild(div);
        });

        if (data.updated) {
          document.getElementById('footer').textContent = 'Last updated ' + data.updated;
        }

        requestAnimationFrame(() => {
          document.querySelectorAll('.bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.target + '%';
          });
        });
      })
      .catch(() => {
        document.getElementById('regions').innerHTML =
          '<p style="color:#c0392b;font-size:14px;">Could not load data. Make sure data.json is in the same folder.</p>';
      });
  </script>
</body>
</html>
